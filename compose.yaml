services:
  postgres:
    image: postgres:16-alpine
    container_name: richme-postgres
    environment:
      POSTGRES_USER: richme
      POSTGRES_PASSWORD: richme
      POSTGRES_DB: richme
    ports:
      - "5432:5432"
    volumes:
      - richme_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U richme -d richme"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  richme_pg_data:
